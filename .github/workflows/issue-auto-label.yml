# =============================================================================
# Issue auto-label — final sketch
# =============================================================================
# When an issue is opened or edited:
#   1. Template: Issue report → Status: Awaiting triage
#   2. Template: Feature request → Type: Feature request
#   3. keywordLabelPairs: multi-word keywords = substring match; single-token = whole-word
#      (so BLE does not match inside "problem"/"table"/"cable")
#   4. Area labels → assignees: resolved from .github/CODEOWNERS using the paths below
#      (same last-match-wins rules as GitHub). Organization teams (@org/team) are skipped
#      because issue assignees must be user logins.
#
# Full label list: .github/ISSUE_TEMPLATE/LABELS.md
# =============================================================================

name: Issue auto-label

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

jobs:
  label-issue:
    name: Apply labels from template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Apply labels based on template and form fields
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const pathMod = require('path');

            const issue = context.payload.issue;
            const body = issue.body || '';
            const title = issue.title || '';
            const existingLabels = (issue.labels || []).map(l => l.name);
            const labelsToAdd = new Set();

            // keywordLabelPairs: see keywordMatches() for single-token vs phrase matching.
            const keywordLabelPairs = [
              { keyword: 'component', label: 'Area: Arduino as ESP-IDF component' },
              { keyword: 'BLE', label: 'Area: BLE' },
              { keyword: 'Bluetooth', label: 'Area: BLE' },
              { keyword: 'BT classic', label: 'Area: BT classic' },
              { keyword: 'BT', label: 'Area: BT classic' },
              { keyword: 'ESP-IDF', label: 'Area: ESP-IDF related' },
              { keyword: 'IDF', label: 'Area: ESP-IDF related' },
              { keyword: 'Lib Builder', label: 'Area: Lib Builder' },
              { keyword: 'Library Builder', label: 'Area: Lib Builder' },
              { keyword: 'Libraries', label: 'Area: Libraries' },
              { keyword: 'Matter', label: 'Area: Matter' },
              { keyword: 'OpenThread', label: 'Area: OpenThread' },
              { keyword: 'OT', label: 'Area: OpenThread' },
              { keyword: 'Performance', label: 'Area: Performance' },
              { keyword: 'Peripheral', label: 'Area: Peripherals API' },
              { keyword: 'Tools', label: 'Area: Tools & Build System' },
              { keyword: 'UART', label: 'Area: UART' },
              { keyword: 'USB', label: 'Area: USB' },
              { keyword: 'WiFi', label: 'Area: WiFi' },
              { keyword: 'Wi-Fi', label: 'Area: WiFi' },
              { keyword: 'Zigbee', label: 'Area: Zigbee' },
              { keyword: 'ZB', label: 'Area: Zigbee' },
              { keyword: 'CI', label: 'Type: CI & Testing' },
              { keyword: 'Arduino IDE', label: 'IDE: Arduino IDE' },
              { keyword: 'Arduino PIO', label: 'IDE: Arduino PIO' },
              { keyword: 'Chip support', label: 'Type: Chip support' }
            ];
            const text = title + '\n' + body;
            const textLower = text.toLowerCase();
            function escapeRegex(s) {
              return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }
            function keywordMatches(keyword) {
              const k = keyword.trim();
              if (k.includes(' ')) {
                return textLower.includes(k.toLowerCase());
              }
              // Single token: whole-word only (avoids "problem"/"table"/"cable" matching "BLE")
              return new RegExp('(?:^|[^a-z0-9_])' + escapeRegex(k) + '(?:[^a-z0-9_]|$)', 'i').test(text);
            }
            for (const { keyword, label } of keywordLabelPairs) {
              if (keywordMatches(keyword)) labelsToAdd.add(label);
            }

            // Detect template and form fields by parsing the issue body.
            // GitHub issue forms render as "### Label\n\nValue"

            // Issue report template: has "### Board" and "### Type" sections
            const isIssueReport = /###\s*Board\s*\n/i.test(body) && /###\s*Type\s*\n/i.test(body);
            // Feature request template: has "### Related area" and "### Is your feature request"
            const isFeatureRequest = /###\s*Related area\s*\n/i.test(body) && /Is your feature request related to a problem/i.test(body);

            if (isIssueReport) {
              labelsToAdd.add('Status: Awaiting triage');
            }

            if (isFeatureRequest) {
              labelsToAdd.add('Type: Feature request');
            }

            // Add only labels that are not already on the issue
            const newLabels = [...labelsToAdd].filter(name => !existingLabels.includes(name));
            if (newLabels.length === 0) {
              core.info('No new labels to add.');
            }
            if (newLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: newLabels
              });
              core.info('Added labels: ' + newLabels.join(', '));
            }

            // Representative repo paths for each Area label (CODEOWNERS is path-based).
            // Use paths that exist under a matching rule; generic areas without a dedicated
            // rule resolve to default owners only (often a team → skipped for assignees).
            const areaLabelToPath = {
              'Area: Arduino as ESP-IDF component': '/idf_component_examples/',
              'Area: BLE': '/libraries/BLE/',
              'Area: BT classic': '/libraries/BLE/',
              'Area: ESP-IDF related': '/CMakeLists.txt',
              'Area: Lib Builder': '/tools/',
              'Area: Libraries': '/libraries/__nocodeowners__/x',
              'Area: Matter': '/libraries/Matter/',
              'Area: OpenThread': '/libraries/OpenThread/',
              'Area: Performance': '/CMakeLists.txt',
              'Area: Peripherals API': '/variants/',
              'Area: Tools & Build System': '/tools/',
              'Area: UART': '/libraries/Console/',
              'Area: USB': '/libraries/USB/',
              'Area: WiFi': '/libraries/WiFi/',
              'Area: Zigbee': '/libraries/Zigbee/'
            };

            function parseCodeowners(content) {
              const rules = [];
              for (const line of content.split(/\r?\n/)) {
                const head = line.split('#')[0].trim();
                if (!head) continue;
                const tokens = head.split(/\s+/);
                const pattern = tokens[0];
                const owners = tokens
                  .slice(1)
                  .filter(t => t.startsWith('@'))
                  .map(t => t.slice(1));
                rules.push({ pattern, owners });
              }
              return rules;
            }

            function normalizeTarget(p) {
              let s = String(p).replace(/\\/g, '/');
              if (!s.startsWith('/')) s = '/' + s;
              return s.replace(/\/+/g, '/');
            }

            function matchesPattern(targetPath, pattern) {
              const path = normalizeTarget(targetPath);
              if (pattern === '*') return true;
              if (pattern === '**/ci.yml') {
                return /(^|\/)ci\.yml$/.test(path);
              }
              if (pattern === '/.*') {
                const parts = path.split('/').filter(Boolean);
                return parts.length === 1 && parts[0].startsWith('.');
              }
              if (pattern === '/*.md') {
                const parts = path.split('/').filter(Boolean);
                return parts.length === 1 && /\.md$/i.test(parts[0]);
              }
              const pat = pattern.startsWith('/') ? pattern : '/' + pattern;
              if (pat.endsWith('/')) {
                return path === pat.slice(0, -1) || path.startsWith(pat);
              }
              return path === pat || path.startsWith(pat + '/');
            }

            function ownersForPath(rules, targetPath) {
              let owners = [];
              const tp = normalizeTarget(targetPath);
              for (const rule of rules) {
                if (matchesPattern(tp, rule.pattern)) {
                  owners = rule.owners;
                }
              }
              return owners;
            }

            function isAssignableLogin(owner) {
              return owner && !owner.includes('/');
            }

            let codeownersRules = [];
            try {
              const cp = pathMod.join(process.env.GITHUB_WORKSPACE, '.github', 'CODEOWNERS');
              codeownersRules = parseCodeowners(fs.readFileSync(cp, 'utf8'));
            } catch (e) {
              core.warning('Could not read .github/CODEOWNERS: ' + e.message);
            }

            const allLabels = [...new Set([...existingLabels, ...newLabels])];
            const assigneesToAdd = new Set();
            for (const label of allLabels) {
              const relPath = areaLabelToPath[label];
              if (!relPath || codeownersRules.length === 0) continue;
              for (const o of ownersForPath(codeownersRules, relPath)) {
                if (isAssignableLogin(o)) assigneesToAdd.add(o);
              }
            }
            const existingAssignees = (issue.assignees || []).map(a => a.login);
            const newAssignees = [...assigneesToAdd].filter(login => !existingAssignees.includes(login));
            if (newAssignees.length > 0) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: newAssignees
              });
              core.info('Added assignees: ' + newAssignees.join(', '));
            }
