tags:
  - two_duts

multi_device:
  device0: server
  device1: client

platforms:
  # Wokwi and QEMU do not support multi-device tests
  wokwi: false
  qemu: false
  hardware:
    esp32p4: false # No two_duts runners using ESP-Hosted

requires_any:
  - CONFIG_SOC_BLE_SUPPORTED=y
  - CONFIG_ESP_HOSTED_ENABLED=y
