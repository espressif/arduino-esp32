paragraph=This library wraps the ESP-IDF OpenThread stack for Arduino. It exposes the OpenThread CLI, a native API (OThread / DataSet), a Thread Joiner (commissioning) helper, and a raw-otUdp socket class (OThreadUDP) for sending/receiving IPv6 UDP datagrams over Thread.
